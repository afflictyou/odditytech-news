# .github/workflows/deploy.yml
#
# Auto-deploy odditytech.news to Namecheap public_html on merge to main.
# Implements the Option 4 pipeline approved on SIG-109.
#
# Required GitHub Actions secrets (already provisioned by board on SIG-109):
#   SFTP_HOST        - Namecheap server hostname (e.g. serverNNN.web-hosting.com)
#   SFTP_USERNAME    - jailed cPanel FTP user, scoped to public_html
#   SFTP_PASSWORD    - that user's password
#   SFTP_TARGET_DIR  - absolute server path to public_html
#                      (e.g. /home/oddimfjz/public_html)
#
# Optional secret (added for SIG-252):
#   INGEST_API_KEY   - same key the /api/v1/* endpoints require; used to call
#                      api/v1/_meta/opcache_reset.php after deploy so LSAPI
#                      drops cached bytecode for replaced files. If absent or
#                      the endpoint is missing, the post-deploy step is a no-op
#                      and the deploy still succeeds.
#
# Protocol: FTPS on port 21 with strict TLS cert verification. This is the
# standard path for Namecheap-provisioned FTP users on shared hosting and
# does NOT require an SSH key or the master cPanel account.
#
# Branch protection on `main` enforces PR review before any deploy runs.

name: Deploy to odditytech.news

on:
  push:
    branches:
      - main
    paths-ignore:
      - '.github/**'
      - '**/README.md'
      - '**/DEPLOY.md'
      - '.gitignore'
      - 'docs/**'
  workflow_dispatch: {}

concurrency:
  group: deploy-prod-odditytech-news
  cancel-in-progress: false

jobs:
  deploy:
    name: FTPS deploy to public_html
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repo at the commit being deployed
        uses: actions/checkout@v4

      - name: FTPS deploy to Namecheap public_html
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.SFTP_HOST }}
          username: ${{ secrets.SFTP_USERNAME }}
          password: ${{ secrets.SFTP_PASSWORD }}
          server-dir: ${{ secrets.SFTP_TARGET_DIR }}/
          protocol: ftps
          port: 21
          security: strict
          state-name: .ftp-deploy-sync-state.json
          dry-run: false
          log-level: standard
          # Files in the repo that should NEVER reach the live server.
          # Extend this list when adding tooling (build configs, docs, secrets)
          # that lives in the repo but doesn't belong on prod.
          exclude: |
            **/.git*
            **/.git*/**
            **/.github/**
            **/.env
            **/.env.*
            **/.DS_Store
            **/node_modules/**
            **/README.md
            **/DEPLOY.md
            **/.gitignore
            **/docs/**
            **/.vscode/**
            **/.idea/**

      - name: Diagnose FTPS server state (SIG-252)
        # TEMP - delete once SIG-252 is closed.
        # Independently fetches a few key files from the FTPS server and
        # prints their size/sha so we can verify that the FTP-Deploy-Action
        # actually placed the bytes on disk vs. silently no-oping.
        if: always()
        continue-on-error: true
        env:
          SFTP_HOST: ${{ secrets.SFTP_HOST }}
          SFTP_USERNAME: ${{ secrets.SFTP_USERNAME }}
          SFTP_PASSWORD: ${{ secrets.SFTP_PASSWORD }}
          SFTP_TARGET_DIR: ${{ secrets.SFTP_TARGET_DIR }}
        run: |
          set +e
          echo "::group::Repo-side hashes"
          for f in api/v1/headlines/index.php api/v1/healthz.php api/v1/ops/opcache_reset.php; do
            if [ -f "$f" ]; then
              sha=$(sha256sum "$f" | awk '{print $1}')
              size=$(wc -c < "$f")
              echo "REPO  $sha  ${size}B  $f"
            else
              echo "REPO  <missing>  $f"
            fi
          done
          echo "::endgroup::"

          echo "::group::Server-side fetch via curl --ftp-ssl"
          for path in api/v1/headlines/index.php api/v1/healthz.php api/v1/ops/opcache_reset.php api/v1/headlines/.htaccess .ftp-deploy-sync-state.json; do
            out=/tmp/srv_$(echo "$path" | tr '/' '_')
            http=$(curl -sS --ftp-ssl --ssl-reqd \
              --user "${SFTP_USERNAME}:${SFTP_PASSWORD}" \
              -o "$out" -w '%{http_code} %{size_download}' \
              "ftp://${SFTP_HOST}${SFTP_TARGET_DIR}/${path}" 2>/dev/null)
            if [ -s "$out" ]; then
              sha=$(sha256sum "$out" | awk '{print $1}')
              echo "SERV  $sha  ${http}  $path"
            else
              echo "SERV  <empty-or-missing>  ${http}  $path"
            fi
          done
          echo "::endgroup::"

          echo "::group::Directory listings"
          for dir in api/v1 api/v1/headlines api/v1/ops; do
            echo "--- $dir ---"
            curl -sS --ftp-ssl --ssl-reqd \
              --user "${SFTP_USERNAME}:${SFTP_PASSWORD}" \
              "ftp://${SFTP_HOST}${SFTP_TARGET_DIR}/${dir}/" 2>&1 | head -20
          done
          echo "::endgroup::"

      - name: Reset PHP OPcache on production (best-effort)
        # SIG-252: shared LiteSpeed/LSAPI caches PHP bytecode across requests.
        # After the FTPS sync replaces api/*.php, ping the dedicated reset
        # endpoint so workers drop stale entries instead of waiting for the
        # next opcache.revalidate cycle. Skipped silently if the API key
        # secret isn't configured; never fails the deploy.
        if: success()
        continue-on-error: true
        env:
          INGEST_API_KEY: ${{ secrets.INGEST_API_KEY }}
        run: |
          if [ -z "${INGEST_API_KEY:-}" ]; then
            echo "INGEST_API_KEY not configured; skipping OPcache reset."
            exit 0
          fi
          status=$(curl -sS -o /tmp/opcache_reset.json -w '%{http_code}' \
            -H "X-API-Key: ${INGEST_API_KEY}" \
            'https://odditytech.news/api/v1/ops/opcache_reset.php' || echo "000")
          echo "opcache_reset HTTP ${status}"
          cat /tmp/opcache_reset.json || true
          echo

      - name: Write deploy summary
        if: always()
        run: |
          {
            echo "### Deploy to odditytech.news"
            echo ""
            echo "- Commit: \`${{ github.sha }}\`"
            echo "- Branch: \`${{ github.ref_name }}\`"
            echo "- Target dir: \`${{ secrets.SFTP_TARGET_DIR }}\`"
            echo "- Event: \`${{ github.event_name }}\` (actor: \`${{ github.actor }}\`)"
            echo "- Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          } >> "$GITHUB_STEP_SUMMARY"
